<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INCOSE IS Value &amp; Decision Framework</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,400&family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..700&family=Instrument+Sans:ital,wght@0,400..700;1,400..500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
/* ── Reset & Base ────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --ink:        #1a1714;
  --ink-light:  #4a4540;
  --ink-faint:  #8a8278;
  --rule:       #e2ddd8;
  --rule-light: #f0ece7;
  --paper:      #faf7f4;
  --paper-warm: #f4efe9;
  --paper-warm2:#ede7de;

  --c1: #3b2fcf; --c1-pale: #eceafc; --c1-mid: #6a5fd4;
  --c2: #1565b8; --c2-pale: #e5f0fb; --c2-mid: #4a8fd4;
  --c3: #0d7a5c; --c3-pale: #e2f5ee; --c3-mid: #3daa8a;
  --c4: #9a5e0a; --c4-pale: #faeedd; --c4-mid: #c98520;

  --font-display: 'Fraunces', Georgia, serif;
  --font-body:    'Instrument Sans', 'Helvetica Neue', sans-serif;
  --font-mono:    'DM Mono', 'Courier New', monospace;

  --radius-sm: 4px;
  --radius-md: 8px;
  --radius-lg: 12px;
  --shadow-sm: 0 1px 3px rgba(26,23,20,.07), 0 1px 2px rgba(26,23,20,.04);
  --shadow-md: 0 4px 12px rgba(26,23,20,.09), 0 2px 4px rgba(26,23,20,.05);
}

html { font-size: 15px; }
body {
  font-family: var(--font-body);
  background: var(--paper);
  color: var(--ink);
  min-height: 100vh;
  line-height: 1.5;
}

/* ── Layout ─────────────────────────────────────────────────────── */
.shell {
  display: grid;
  grid-template-columns: 220px 1fr;
  grid-template-rows: auto 1fr;
  min-height: 100vh;
}
.topbar {
  grid-column: 1 / -1;
  background: var(--ink);
  color: var(--paper);
  padding: 14px 28px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  position: sticky;
  top: 0;
  z-index: 100;
}
.topbar-title {
  font-family: var(--font-display);
  font-size: 1.15rem;
  font-weight: 500;
  letter-spacing: -.01em;
  color: var(--paper);
  white-space: nowrap;
}
.topbar-title em { font-style: italic; font-weight: 300; color: #bfb8b0; }
.topbar-pills { display: flex; gap: 6px; flex-wrap: wrap; }
.pill {
  font-size: .65rem;
  font-family: var(--font-mono);
  padding: 2px 9px;
  border-radius: 20px;
  letter-spacing: .03em;
  white-space: nowrap;
}
.pill1 { background: var(--c1-pale); color: var(--c1); }
.pill2 { background: var(--c2-pale); color: var(--c2); }
.pill3 { background: var(--c3-pale); color: var(--c3); }
.pill4 { background: var(--c4-pale); color: var(--c4); }

.sidebar {
  background: var(--paper-warm);
  border-right: 1px solid var(--rule);
  padding: 24px 0;
  position: sticky;
  top: 49px;
  height: calc(100vh - 49px);
  overflow-y: auto;
}
.sidebar-section {
  padding: 0 16px;
  margin-bottom: 6px;
}
.sidebar-label {
  font-size: .6rem;
  font-family: var(--font-mono);
  text-transform: uppercase;
  letter-spacing: .08em;
  color: var(--ink-faint);
  padding: 12px 8px 5px;
  display: block;
}
.nav-btn {
  display: flex;
  align-items: center;
  gap: 9px;
  width: 100%;
  padding: 7px 10px;
  border-radius: var(--radius-sm);
  border: none;
  background: none;
  cursor: pointer;
  font-family: var(--font-body);
  font-size: .78rem;
  color: var(--ink-light);
  text-align: left;
  transition: background .12s, color .12s;
}
.nav-btn:hover { background: var(--paper-warm2); color: var(--ink); }
.nav-btn.active { background: var(--ink); color: var(--paper); }
.nav-btn .nb-icon { font-size: .85rem; flex-shrink: 0; opacity: .7; }
.nav-btn.active .nb-icon { opacity: 1; }
.nav-divider { height: 1px; background: var(--rule); margin: 8px 16px; }

.main {
  padding: 32px 36px;
  max-width: 960px;
}

/* ── Section header ─────────────────────────────────────────────── */
.section-head {
  margin-bottom: 22px;
}
.section-eyebrow {
  font-size: .6rem;
  font-family: var(--font-mono);
  text-transform: uppercase;
  letter-spacing: .1em;
  color: var(--ink-faint);
  margin-bottom: 4px;
}
.section-title {
  font-family: var(--font-display);
  font-size: 1.65rem;
  font-weight: 600;
  letter-spacing: -.02em;
  line-height: 1.15;
  color: var(--ink);
}
.section-desc {
  font-size: .82rem;
  color: var(--ink-light);
  margin-top: 6px;
  line-height: 1.55;
  max-width: 620px;
}

/* ── Cards & Grids ──────────────────────────────────────────────── */
.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
.grid4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
.span2 { grid-column: 1 / -1; }

.card {
  background: #fff;
  border: 1px solid var(--rule);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-sm);
  overflow: hidden;
}
.card-head {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 13px;
  cursor: pointer;
  background: var(--paper-warm);
  transition: background .12s;
  user-select: none;
}
.card-head:hover { background: var(--paper-warm2); }
.card-icon { font-size: .95rem; color: var(--ink-light); flex-shrink: 0; }
.card-title { font-size: .82rem; font-weight: 600; color: var(--ink); flex: 1; line-height: 1.3; }
.obj-row { display: flex; gap: 3px; flex-shrink: 0; }
.od { width: 7px; height: 7px; border-radius: 50%; }
.od1 { background: var(--c1); } .od2 { background: var(--c2); }
.od3 { background: var(--c3); } .od4 { background: var(--c4); }
.chev { font-size: .65rem; color: var(--ink-faint); flex-shrink: 0; transition: transform .18s; }
.chev.open { transform: rotate(90deg); }
.card-body {
  display: none;
  padding: 12px 13px;
  border-top: 1px solid var(--rule-light);
}
.card-body.open { display: block; }

.sub-label {
  font-size: .6rem;
  font-family: var(--font-mono);
  text-transform: uppercase;
  letter-spacing: .07em;
  color: var(--ink-faint);
  margin-bottom: 5px;
  margin-top: 10px;
}
.sub-label:first-child { margin-top: 0; }

.item {
  font-size: .77rem;
  color: var(--ink);
  padding: 3.5px 0;
  border-bottom: 1px solid var(--rule-light);
  line-height: 1.45;
  display: flex;
  align-items: flex-start;
  gap: 6px;
}
.item:last-child { border-bottom: none; }
.item-dot { width: 3px; height: 3px; border-radius: 50%; background: var(--rule); margin-top: 8px; flex-shrink: 0; }

.crit {
  font-size: .73rem;
  color: var(--ink-light);
  padding: 2.5px 0 2.5px 12px;
  line-height: 1.4;
  position: relative;
}
.crit::before { content: '→'; position: absolute; left: 0; font-size: .65rem; color: var(--ink-faint); }

/* ── Phase subsection headers ───────────────────────────────────── */
.phase-sub {
  font-size: .62rem;
  font-family: var(--font-mono);
  text-transform: uppercase;
  letter-spacing: .08em;
  color: var(--ink-faint);
  padding-bottom: 7px;
  border-bottom: 1px solid var(--rule);
  margin-bottom: 10px;
}
.phase-sub:not(:first-child) { margin-top: 20px; }

/* ── Knowledge Architecture Card ────────────────────────────────── */
.ka-card {
  background: #fff;
  border: 1.5px solid var(--c1-mid);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-sm);
  overflow: hidden;
}
.ka-head {
  display: flex;
  align-items: center;
  gap: 9px;
  padding: 11px 14px;
  cursor: pointer;
  background: var(--c1-pale);
  transition: background .12s;
  user-select: none;
}
.ka-head:hover { background: #dddafc; }
.ka-title { font-size: .84rem; font-weight: 600; color: var(--c1); flex: 1; }
.ka-badge {
  font-size: .6rem;
  font-family: var(--font-mono);
  background: var(--c1);
  color: var(--c1-pale);
  padding: 2px 8px;
  border-radius: 20px;
  letter-spacing: .02em;
  flex-shrink: 0;
}
.ka-body { display: none; padding: 14px; border-top: 1px solid #c8c5f0; }
.ka-body.open { display: block; }
.ka-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 10px; }
.ka-item {
  background: var(--paper-warm);
  border: 1px solid var(--rule-light);
  border-radius: var(--radius-md);
  padding: 9px 10px;
}
.ka-item-title { font-size: .75rem; font-weight: 600; color: var(--ink); margin-bottom: 4px; }
.ka-item-body { font-size: .7rem; color: var(--ink-light); line-height: 1.45; }
.gov-note {
  margin-top: 10px;
  padding: 9px 11px;
  background: var(--c1-pale);
  border-radius: var(--radius-md);
  border-left: 3px solid var(--c1);
}
.gov-note-label { font-size: .6rem; font-family: var(--font-mono); text-transform: uppercase; letter-spacing: .06em; color: var(--c1); display: block; margin-bottom: 4px; }
.gov-note-body { font-size: .73rem; color: var(--ink-light); line-height: 1.5; }

/* ── Overview stats ─────────────────────────────────────────────── */
.stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 20px; }
.stat-card {
  background: #fff;
  border: 1px solid var(--rule);
  border-radius: var(--radius-lg);
  padding: 14px 16px;
  text-align: center;
  box-shadow: var(--shadow-sm);
}
.stat-num {
  font-family: var(--font-display);
  font-size: 2.2rem;
  font-weight: 700;
  color: var(--ink);
  line-height: 1;
  margin-bottom: 5px;
}
.stat-label { font-size: .67rem; font-family: var(--font-mono); color: var(--ink-faint); text-transform: uppercase; letter-spacing: .06em; line-height: 1.3; }

/* ── Phase summary cards (overview) ─────────────────────────────── */
.phase-card {
  background: #fff;
  border: 1px solid var(--rule);
  border-radius: var(--radius-lg);
  overflow: hidden;
  box-shadow: var(--shadow-sm);
}
.phase-card-head {
  padding: 12px 15px;
  border-bottom: 1px solid var(--rule-light);
}
.phase-card-title { font-size: .9rem; font-weight: 700; margin-bottom: 2px; }
.phase-card-sub { font-size: .7rem; font-family: var(--font-mono); opacity: .7; }
.phase-card-body { padding: 10px 14px; }
.phase-card-item {
  font-size: .75rem;
  color: var(--ink-light);
  padding: 4px 0;
  display: flex;
  align-items: center;
  gap: 7px;
  cursor: pointer;
  border-bottom: 1px solid var(--rule-light);
  transition: color .1s;
}
.phase-card-item:last-child { border-bottom: none; }
.phase-card-item:hover { color: var(--ink); }
.phase-card-item .pci-icon { font-size: .75rem; opacity: .5; flex-shrink: 0; }
.phase-card-foot {
  padding: 8px 14px;
  border-top: 1px solid var(--rule-light);
  background: var(--paper-warm);
}
.explore-link {
  font-size: .72rem;
  font-family: var(--font-mono);
  border: none;
  background: none;
  cursor: pointer;
  padding: 0;
  text-decoration: none;
  transition: opacity .12s;
}
.explore-link:hover { opacity: .7; }
.el-pre { color: var(--c3); }
.el-during { color: var(--c2); }
.el-post { color: var(--c1); }

/* ── Lifecycle SVG wrapper ──────────────────────────────────────── */
.lifecycle-wrap {
  background: #fff;
  border: 1px solid var(--rule);
  border-radius: var(--radius-lg);
  padding: 20px 24px;
  margin-bottom: 20px;
  box-shadow: var(--shadow-sm);
  overflow-x: auto;
}
.lifecycle-wrap svg { display: block; min-width: 580px; }

/* ── Chapter Viability ──────────────────────────────────────────── */
.cv-slider-card {
  background: #fff;
  border: 1px solid var(--rule);
  border-radius: var(--radius-lg);
  padding: 13px 15px;
  box-shadow: var(--shadow-sm);
}
.cv-dim-title { font-size: .81rem; font-weight: 600; color: var(--ink); margin-bottom: 3px; }
.cv-dim-desc { font-size: .7rem; color: var(--ink-light); line-height: 1.4; margin-bottom: 9px; }
input[type=range] {
  -webkit-appearance: none;
  appearance: none;
  width: 100%;
  height: 4px;
  border-radius: 2px;
  background: var(--rule);
  outline: none;
  cursor: pointer;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none;
  appearance: none;
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: var(--c1);
  cursor: pointer;
  transition: transform .1s;
}
input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.2); }
.range-labels { display: flex; justify-content: space-between; font-size: .6rem; font-family: var(--font-mono); color: var(--ink-faint); margin-top: 3px; }

.score-display {
  background: var(--ink);
  border-radius: var(--radius-lg);
  padding: 20px;
  text-align: center;
  color: var(--paper);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}
.score-num {
  font-family: var(--font-display);
  font-size: 3.5rem;
  font-weight: 700;
  line-height: 1;
  margin-bottom: 4px;
}
.score-denom { font-size: .7rem; font-family: var(--font-mono); opacity: .5; margin-bottom: 12px; }
.score-band {
  font-size: .72rem;
  font-weight: 600;
  padding: 4px 12px;
  border-radius: 20px;
  line-height: 1.3;
  text-align: center;
}

.cv-result-card {
  grid-column: 1 / -1;
  background: #fff;
  border: 1px solid var(--rule);
  border-radius: var(--radius-lg);
  padding: 14px 16px;
  box-shadow: var(--shadow-sm);
}
.cv-result-label { font-size: .6rem; font-family: var(--font-mono); text-transform: uppercase; letter-spacing: .07em; color: var(--ink-faint); margin-bottom: 6px; }
.cv-result-text { font-size: .8rem; color: var(--ink-light); line-height: 1.55; }

.checklist {
  background: #fff;
  border: 1px solid var(--rule);
  border-radius: var(--radius-lg);
  overflow: hidden;
  box-shadow: var(--shadow-sm);
}
.checklist-head {
  padding: 10px 14px;
  background: var(--paper-warm);
  border-bottom: 1px solid var(--rule);
  font-size: .65rem;
  font-family: var(--font-mono);
  text-transform: uppercase;
  letter-spacing: .07em;
  color: var(--ink-faint);
}
.check-item {
  font-size: .77rem;
  color: var(--ink-light);
  padding: 8px 14px;
  border-bottom: 1px solid var(--rule-light);
  display: flex;
  align-items: flex-start;
  gap: 9px;
  line-height: 1.4;
}
.check-item:last-child { border-bottom: none; }
.check-circle {
  width: 15px;
  height: 15px;
  border: 1.5px solid var(--rule);
  border-radius: 50%;
  flex-shrink: 0;
  margin-top: 1px;
  cursor: pointer;
  transition: all .12s;
  display: flex;
  align-items: center;
  justify-content: center;
}
.check-circle.checked { background: var(--c3); border-color: var(--c3); }
.check-circle.checked::after { content: '✓'; font-size: .55rem; color: #fff; }

/* ── Lessons Learned ────────────────────────────────────────────── */
.loop-diagram {
  display: grid;
  grid-template-columns: 1fr auto 1fr auto 1fr;
  gap: 0;
  align-items: center;
  background: #fff;
  border: 1px solid var(--rule);
  border-radius: var(--radius-lg);
  padding: 16px 20px;
  margin-bottom: 16px;
  box-shadow: var(--shadow-sm);
}
.loop-node {
  text-align: center;
  padding: 10px 8px;
}
.loop-node-title { font-size: .8rem; font-weight: 700; color: var(--ink); margin-bottom: 3px; }
.loop-node-sub { font-size: .67rem; color: var(--ink-light); line-height: 1.35; }
.loop-arrow { font-size: 1.2rem; color: var(--rule); text-align: center; padding: 0 6px; }

.ll-card {
  background: #fff;
  border: 1px solid var(--rule);
  border-radius: var(--radius-lg);
  overflow: hidden;
  box-shadow: var(--shadow-sm);
}
.ll-head {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 13px;
  cursor: pointer;
  background: var(--paper-warm);
  transition: background .12s;
  user-select: none;
}
.ll-head:hover { background: var(--paper-warm2); }
.ll-body { display: none; padding: 12px 13px; border-top: 1px solid var(--rule-light); }
.ll-body.open { display: block; }
.ff-chip {
  margin-top: 9px;
  padding: 7px 10px;
  background: var(--c1-pale);
  border-radius: var(--radius-sm);
  font-size: .7rem;
  color: var(--c1);
  line-height: 1.45;
}
.ff-chip strong { font-weight: 600; }

.doc-std {
  background: #fff;
  border: 1px solid var(--rule);
  border-radius: var(--radius-lg);
  overflow: hidden;
  margin-top: 14px;
  box-shadow: var(--shadow-sm);
}
.doc-std-head {
  padding: 9px 14px;
  background: var(--paper-warm);
  border-bottom: 1px solid var(--rule);
  font-size: .62rem;
  font-family: var(--font-mono);
  text-transform: uppercase;
  letter-spacing: .07em;
  color: var(--ink-faint);
}
.doc-std-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px; background: var(--rule-light); }
.doc-std-item { background: #fff; padding: 9px 12px; }
.doc-std-key { font-size: .73rem; font-weight: 600; color: var(--ink); margin-bottom: 3px; }
.doc-std-val { font-size: .69rem; color: var(--ink-light); line-height: 1.4; }

/* ── Decision Evaluator ─────────────────────────────────────────── */
.de-input {
  width: 100%;
  font-size: .82rem;
  font-family: var(--font-body);
  padding: 10px 13px;
  border: 1.5px solid var(--rule);
  border-radius: var(--radius-md);
  background: #fff;
  color: var(--ink);
  margin-bottom: 14px;
  outline: none;
  transition: border-color .15s;
}
.de-input:focus { border-color: var(--c1-mid); }
.de-input::placeholder { color: var(--ink-faint); }

.de-slider-card {
  background: #fff;
  border: 1px solid var(--rule);
  border-radius: var(--radius-lg);
  padding: 12px 14px;
  box-shadow: var(--shadow-sm);
}
.de-obj-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 5px; }
.de-obj-name { font-size: .8rem; font-weight: 600; color: var(--ink); display: flex; align-items: center; gap: 6px; }
.de-obj-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.de-weight { font-size: .62rem; font-family: var(--font-mono); color: var(--ink-faint); }
.de-val-label { font-size: .72rem; color: var(--ink-light); }
.de-range-row { margin-top: 4px; }
.de-range-marks { display: flex; justify-content: space-between; font-size: .58rem; font-family: var(--font-mono); color: var(--ink-faint); margin-top: 2px; }

.de-result-panel {
  background: #fff;
  border: 1px solid var(--rule);
  border-radius: var(--radius-lg);
  overflow: hidden;
  box-shadow: var(--shadow-sm);
}
.de-result-head {
  padding: 10px 14px;
  background: var(--paper-warm);
  border-bottom: 1px solid var(--rule);
  font-size: .62rem;
  font-family: var(--font-mono);
  text-transform: uppercase;
  letter-spacing: .07em;
  color: var(--ink-faint);
}
.de-bars { padding: 12px 14px; }
.de-bar-row { display: flex; align-items: center; gap: 8px; margin-bottom: 7px; }
.de-bar-label { font-size: .72rem; color: var(--ink-light); min-width: 80px; flex-shrink: 0; display: flex; align-items: center; gap: 5px; }
.de-bar-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.de-bar-wt { font-size: .6rem; font-family: var(--font-mono); color: var(--ink-faint); min-width: 18px; flex-shrink: 0; }
.de-bar-track { flex: 1; height: 6px; background: var(--rule-light); border-radius: 3px; overflow: hidden; }
.de-bar-fill { height: 100%; border-radius: 3px; transition: width .25s ease; }
.de-bar-num { font-size: .75rem; font-weight: 600; color: var(--ink); min-width: 24px; text-align: right; flex-shrink: 0; }

.de-verdict {
  margin: 0 14px 14px;
  padding: 10px 12px;

function dots(objs) {
  return objs.map(o => `<span class="od od${o}"></span>`).join('');
}

function renderCard(d) {
  const sp = d.special ? 'ka-card' : 'card';
  const hc = d.special ? 'ka-head' : 'card-head';
  const bc = d.special ? 'ka-body' : 'card-body';
  const isOpen = openCards[d.id] || false;

  if (d.special) {
    return `
    <div class="${sp} span2" id="card-${d.id}">
      <div class="${hc}" onclick="togCard('${d.id}')">
        <span style="font-size:.95rem">${d.icon}</span>
        <span class="ka-title">${d.title}</span>
        <span class="ka-badge">Integrating layer — all objectives</span>
        <span class="chev${isOpen?' open':''}" id="chv-${d.id}">›</span>
      </div>
      <div class="${bc}${isOpen?' open':''}" id="dcb-${d.id}">
        <p style="font-size:.77rem;color:var(--ink-light);line-height:1.55;margin-bottom:4px">${d.items.map(i=>`• ${i}`).join('<br>')}</p>
        <div class="ka-grid">
          ${d.kaItems.map(k=>`<div class="ka-item"><div class="ka-item-title">${k.t}</div><div class="ka-item-body">${k.b}</div></div>`).join('')}
        </div>
        <div class="gov-note">
          <span class="gov-note-label">Governance note — design pre-event, not post</span>
          <span class="gov-note-body">${d.govNote}</span>
        </div>
      </div>
    </div>`;
  }

  return `
  <div class="card${d.objs.includes(1)&&d.objs.includes(2)&&d.objs.includes(3)&&d.objs.includes(4)?' span2':''}" id="card-${d.id}">
    <div class="card-head" onclick="togCard('${d.id}')">
      <span class="card-icon">${d.icon}</span>
      <span class="card-title">${d.title}</span>
      <div class="obj-row">${dots(d.objs)}</div>
      <span class="chev${isOpen?' open':''}" id="chv-${d.id}">›</span>
    </div>
    <div class="card-body${isOpen?' open':''}" id="dcb-${d.id}">
      <div class="sub-label">Key decisions</div>
      ${d.items.map(i=>`<div class="item"><span class="item-dot"></span><span>${i}</span></div>`).join('')}
      <div class="sub-label">Decision criteria</div>
      ${d.crit.map(c=>`<div class="crit">${c}</div>`).join('')}
    </div>
  </div>`;
}

function togCard(id) {
  openCards[id] = !openCards[id];
  const b = document.getElementById('dcb-'+id);
  const c = document.getElementById('chv-'+id);
  if (b) b.classList.toggle('open', openCards[id]);
  if (c) c.classList.toggle('open', openCards[id]);
}

function vPhase(ph) {
  const meta = {
    pre:    {ey:'Lifecycle — Phase 1', t:'Pre-event decisions', d:'Four decision domains spanning content strategy, venue and logistics, communications, and participant preparation. Chapter viability and lessons from prior events should directly inform each domain.'},
    during: {ey:'Lifecycle — Phase 2', t:'During-event decisions', d:'Three active-management domains covering session facilitation standards, live engagement and feedback capture, and daily wrap-up production for immediate and longitudinal value.'},
    post:   {ey:'Lifecycle — Phase 3', t:'Post-event decisions', d:'Seven post-event domains across content capture, feedback, member-facing communications, and the integrating knowledge architecture layer. Knowledge architecture must be designed pre-event — it cannot be retrofitted.'},
  }[ph];

  let cards = '';
  if (ph === 'post') {
    cards += `<div class="phase-sub">Content &amp; knowledge capture</div><div class="grid2">`;
    DATA.post.slice(0,4).forEach(d => { cards += renderCard(d); });
    cards += `</div><div class="phase-sub mt16">Feedback, visibility &amp; discovery</div><div class="grid2">`;
    DATA.post.slice(4).forEach(d => { cards += renderCard(d); });
    cards += `</div>`;
  } else {
    cards = `<div class="grid2">${DATA[ph].map(renderCard).join('')}</div>`;
  }

  let extra = '';
  if (ph === 'pre') {
    extra = `
    <div class="grid2 mt16">
      <div class="phase-card" style="cursor:pointer" onclick="goTo('chapter')">
        <div class="phase-card-head" style="background:#faeedd;border-color:#e8b86c">
          <div class="phase-card-title" style="color:#9a5e0a">🏢 Chapter viability</div>
          <div class="phase-card-sub" style="color:#c98520">Assess local chapter hosting capacity before commitment</div>
        </div>
        <div class="phase-card-foot"><button class="explore-link" style="color:#9a5e0a" onclick="event.stopPropagation();goTo('chapter')">Open viability assessor →</button></div>
      </div>
      <div class="phase-card" style="cursor:pointer" onclick="goTo('lessons')">
        <div class="phase-card-head" style="background:var(--paper-warm);border-color:var(--rule)">
          <div class="phase-card-title">📚 Lessons from prior IS events</div>
          <div class="phase-card-sub" style="color:var(--ink-faint)">Apply prior feedback to all planning decisions</div>
        </div>
        <div class="phase-card-foot"><button class="explore-link" style="color:var(--c1)" onclick="event.stopPropagation();goTo('lessons')">Review lessons →</button></div>

  return `

  <div class="section-eyebrow">${meta.ey}</div>

  <div class="section-desc">${meta.d}</div>

}

function cvBand(s) {
  if (s < 1.8) return {l:'Not viable for IS hosting', bg:'#FCEBEB', c:'#A32D2D', r:'Chapter does not meet minimum criteria. Recommend alternative venue search or significant capacity-building investment before any hosting commitment.'};
  if (s < 2.5) return {l:'Viable — substantial INCOSE central support required', bg:'#FAEEDD', c:'#854F0B', r:'Chapter contributes local knowledge and relationships, but INCOSE central must lead planning, contracting, and logistics execution. Assign a dedicated IS Operations lead.'};
  if (s < 3.5) return {l:'Strong — shared leadership model recommended', bg:'#E6F1FB', c:'#185FA5', r:'Chapter and INCOSE central share responsibility with clear domain ownership. Chapter leads venue, local sponsors, on-ground logistics. INCOSE central leads content, communications, and financial governance.'};
  return {l:'Exceptional — chapter can lead with light oversight', bg:'#E2F5EE', c:'#085041', r:'Chapter has demonstrated capacity to lead IS hosting with minimal central support. Maintain oversight on content governance and financial controls only; delegate logistics leadership to the chapter.'};
}

function updCV() {
  const s = +(cvVals.reduce((a,b)=>a+b,0)/cvVals.length).toFixed(1);

  if (bd) { bd.textContent = b.l; bd.style.background = b.bg; bd.style.color = b.c; }
  if (r) r.textContent = b.r;

/* ═══════════════════════════════════════════════════════════════
   VIEW — Decision Evaluator
═══════════════════════════════════════════════════════════════ */
const SCORE_LABELS = ['Strong negative','Moderate negative','Neutral','Moderate positive','Strong positive'];

function getVerdict() {
  const ws = deVals.reduce((a,v,i) => a + v * OBJ_WEIGHTS[i], 0);
  const max = OBJ_WEIGHTS.reduce((a,w) => a + w*2, 0);
  const sc = ws / max;
  if (sc < -0.5) return {t:'Strongly discourage',    d:'Weighted impact significantly negative across high-priority objectives. Reconsider or redesign this decision before proceeding.', bg:'#FCEBEB', c:'#A32D2D'};
  if (sc < -0.2) return {t:'Proceed with caution',   d:'Decision creates tradeoffs that may be difficult to recover from. Identify which high-priority objectives are most harmed and build explicit mitigations.', bg:'#FAEEDD', c:'#854F0B'};
  if (sc < 0.2)  return {t:'Conditional — implementation design matters', d:'Net weighted impact is neutral. Outcome depends heavily on how this decision is designed and what mitigations are put in place for lower-scoring objectives.', bg:'var(--paper-warm2)', c:'var(--ink-light)'};
  if (sc < 0.5)  return {t:'Recommended with active monitoring', d:'Decision is net positive. Put monitoring plans in place for the objectives with lower scores and be prepared to adjust implementation as outcomes become visible.', bg:'#E6F1FB', c:'#185FA5'};
  return {t:'Strongly recommended',  d:'Broad positive impact across INCOSE strategic objectives, weighted toward the highest-priority dimensions. Move forward with confidence.', bg:'#E2F5EE', c:'#085041'};
}

function updDE() {
  deVals.forEach((v,i) => {
    const lbl = document.getElementById('devl-'+i);
    const fill = document.getElementById('deb-'+i);
    const num = document.getElementById('den-'+i);
    if (lbl) lbl.textContent = SCORE_LABELS[v+2];
    if (fill) fill.style.width = Math.max(0, ((v+2)/4)*100) + '%';
    if (num)  num.textContent = (v >= 0 ? '+' : '') + v;
  });
  const vd = document.getElementById('deVerdictBox');
  if (vd) {
    const r = getVerdict();
    document.getElementById('deVerdictTitle').textContent = r.t;
    document.getElementById('deVerdictDesc').textContent  = r.d;
    vd.style.background = r.bg;
    vd.style.color = r.c;
    const tEl = document.getElementById('deVerdictTitle');
    const dEl = document.getElementById('deVerdictDesc');
    if (tEl) tEl.style.color = r.c;
    if (dEl) dEl.style.color = r.c;
  }
  if (radarChart) {
    radarChart.data.datasets[0].data = deVals.map(v => v + 2);
    radarChart.update();
  }
}

function initRadar() {
  setTimeout(() => {
    const cv = document.getElementById('deRadar');
    if (!cv || !window.Chart) return;
    if (radarChart) { radarChart.destroy(); radarChart = null; }
    radarChart = new Chart(cv, {
      type: 'radar',
      data: {
        labels: ['Authority','Development','Community','Excellence'],
        datasets: [{
          data: deVals.map(v => v+2),
          backgroundColor: 'rgba(59,47,207,0.1)',
          borderColor: '#3b2fcf',
          borderWidth: 1.5,
          pointBackgroundColor: OBJ_COLORS,
          pointRadius: 4,
          pointHoverRadius: 5,
        }]
      },
      options: {
        responsive: false,
        scales: {
          r: {
            min: 0, max: 4,
            ticks: { stepSize: 1, display: false },
            grid: { color: 'rgba(0,0,0,.08)' },
            angleLines: { color: 'rgba(0,0,0,.08)' },
            pointLabels: { font: { size: 11, family: "'Instrument Sans', sans-serif" }, color: '#4a4540' }
          }
        },
        plugins: { legend: { display: false } },
        animation: { duration: 200 }
      }
    });
  }, 120);
}

function vEvaluator() {
  const r = getVerdict();
  return `
<div class="section-head">

  <div class="section-title">Decision evaluator</div>
  <div class="section-desc">Describe a candidate IS decision and rate its expected impact on each strategic objective (−2 to +2). The evaluator applies the value hierarchy priority weighting — objective ① carries 4× the weight of ④, reflecting that trusted authority is INCOSE's foundational identity.</div>
</div>

<input class="de-input" type="text" placeholder="Describe the IS decision being evaluated — e.g. 'Move IS to a fully virtual format' or 'Open all session recordings publicly at event close'…">

<div class="grid2 mb14">
  ${deVals.map((v,i)=>`
  <div class="de-slider-card">
    <div class="de-obj-row">

      <div class="de-bar-row">

        <div class="de-bar-track"><div class="de-bar-fill" id="deb-${i}" style="width:${Math.max(0,((v+2)/4)*100)}%;background:${OBJ_COLORS[i]}"></div></div>
        <div class="de-bar-num" id="den-${i}">${v>=0?'+'+v:v}</div>
      </div>`).join('')}
    </div>
    <div class="de-verdict" id="deVerdictBox" style="background:${r.bg};color:${r.c}">
      <span class="de-verdict-label" style="color:${r.c}">Priority-weighted verdict</span>
      <div class="de-verdict-title" id="deVerdictTitle" style="color:${r.c}">${r.t}</div>
      <div class="de-verdict-desc" id="deVerdictDesc" style="color:${r.c}">${r.d}</div>
    </div>
  </div>
  <div class="de-result-panel">
    <div class="de-result-head">Objective impact profile</div>
    <div class="de-radar-wrap">
      <canvas id="deRadar" width="200" height="200"></canvas>
      <div class="de-radar-caption">Dot colors correspond to each strategic objective</div>
    </div>
  </div>
</div>`;
}

const VIEWS = {
  overview:  vOverview,
  pre:       () => vPhase('pre'),
  during:    () => vPhase('during'),
  post:      () => vPhase('post'),
  chapter:   vChapter,
  lessons:   vLessons,
  evaluator: vEvaluator,
};

function goTo(v) {
  document.querySelectorAll('.nav-btn').forEach(b => {
    const oc = b.getAttribute('onclick') || '';
    b.classList.toggle('active', oc.includes("'"+v+"'"));
  });
  const main = document.getElementById('main-content');
  if (main) {
    main.innerHTML = (VIEWS[v] || vOverview)();
    main.scrollTop = 0;
  }
  if (v === 'evaluator') initRadar();
}
