<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taxonomy Tree Editor</title>
<style>
:root {
  --bg:#1a1d2e; --panel:#22253a; --panel2:#2a2e47; --border:#363a5a;
  --accent:#7c83f5; --accent2:#a5aaff; --success:#4ade80; --danger:#f87171;
  --warn:#fbbf24; --text:#e2e8f0; --text-dim:#8b93b8; --text-muted:#555d8a;
  --drop:#4ade80; --drop-bg:rgba(74,222,128,.08);
  --node-bg:#2a2e47; --node-border:#363a5a; --node-hover:#363a5a;
  --connector:#363a5a;
  --sans:'Inter',system-ui,sans-serif; --mono:'Cascadia Code','Fira Code',monospace;
  --radius:6px; --left-w:260px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--sans);background:var(--bg);color:var(--text);
  height:100vh;display:flex;flex-direction:column;overflow:hidden;font-size:13px;}

/* ── TOP BAR ── */
.topbar{display:flex;align-items:center;gap:10px;padding:8px 14px;
  background:var(--panel);border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap;}
.brand{font-size:14px;font-weight:700;letter-spacing:.02em;white-space:nowrap;}
.brand span{color:var(--text-dim);font-weight:400;font-size:11px;}
.spacer{flex:1;}
.conn-status{width:8px;height:8px;border-radius:50%;background:var(--text-muted);flex-shrink:0;}
.conn-status.connected{background:var(--success);}
.conn-status.loading{background:var(--warn);animation:pulse 1s infinite;}
.conn-status.error{background:var(--danger);}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
input[type=text]{background:var(--panel2);border:1px solid var(--border);color:var(--text);
  border-radius:var(--radius);padding:5px 9px;font-size:12px;font-family:var(--sans);}
input[type=text]:focus{outline:none;border-color:var(--accent);}
.btn{font-size:12px;border-radius:var(--radius);border:1px solid var(--border);
  background:var(--panel2);color:var(--text);padding:5px 11px;cursor:pointer;transition:all .15s;white-space:nowrap;}
.btn:hover{border-color:var(--accent);}
.btn-primary{background:var(--accent);border-color:var(--accent);color:#fff;}
.btn-primary:hover{background:var(--accent2);}
.btn-ghost{background:transparent;border-color:transparent;}
.btn-sm{padding:3px 8px;font-size:11px;}
.view-toggle{display:flex;gap:0;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}
.view-toggle button{border:none;background:var(--panel2);color:var(--text-dim);
  padding:5px 11px;font-size:11px;cursor:pointer;transition:all .15s;}
.view-toggle button.active{background:var(--accent);color:#fff;}

/* ── LAYOUT ── */
.workspace{display:flex;flex:1;overflow:hidden;}
.left-panel{width:var(--left-w);min-width:200px;max-width:400px;
  background:var(--panel);border-right:1px solid var(--border);
  display:flex;flex-direction:column;flex-shrink:0;}
.resizer{width:5px;background:var(--border);cursor:col-resize;flex-shrink:0;transition:background .15s;}
.resizer:hover{background:var(--accent);}
.canvas-area{flex:1;overflow:auto;position:relative;}
.panel-hdr{padding:8px 12px;font-size:10px;font-weight:700;text-transform:uppercase;
  letter-spacing:.07em;color:var(--text-dim);border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:6px;flex-shrink:0;}
.panel-hdr input{flex:1;font-size:11px;padding:3px 6px;}
.concept-list{flex:1;overflow-y:auto;padding:4px 0;}

/* ── LEFT PANEL CONCEPT ITEMS ── */
.concept-item{display:flex;align-items:center;gap:6px;padding:6px 12px;
  cursor:grab;user-select:none;border-bottom:1px solid rgba(54,58,90,.4);
  transition:background .1s;}
.concept-item:hover{background:var(--panel2);}
.concept-item.dragging-source{opacity:.4;}
.concept-item.unplaced{border-left:2px solid var(--warn);}
.ci-label{font-size:12px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.ci-iri{font-size:10px;color:var(--text-muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.ci-badge{font-size:10px;background:var(--panel2);border:1px solid var(--border);
  border-radius:3px;padding:1px 5px;color:var(--text-dim);flex-shrink:0;}

/* ── TREE CANVAS ── */
.canvas-inner{padding:32px;min-width:100%;min-height:100%;display:inline-block;}
.canvas-empty{display:flex;align-items:center;justify-content:center;
  height:100%;color:var(--text-muted);font-size:13px;text-align:center;padding:40px;}

/* ── TREE NODES (TOP-DOWN view) ── */
.tree-root{display:flex;flex-direction:column;gap:0;}
.tree-level{display:flex;gap:24px;justify-content:center;margin-bottom:0;}
.tree-col{display:flex;flex-direction:column;align-items:center;}
.node-wrap{display:flex;flex-direction:column;align-items:center;}
.node-children-td{display:flex;gap:16px;margin-top:0;}

.tnode{background:var(--node-bg);border:1.5px solid var(--node-border);
  border-radius:8px;padding:8px 12px;min-width:120px;max-width:200px;
  cursor:pointer;user-select:none;transition:all .15s;position:relative;
  display:flex;flex-direction:column;gap:2px;}
.tnode:hover{border-color:var(--accent);background:var(--node-hover);}
.tnode.selected{border-color:var(--accent);box-shadow:0 0 0 2px rgba(124,131,245,.3);}
.tnode.top-concept{border-color:var(--accent2);}
.tnode.drop-target{border-color:var(--drop)!important;background:var(--drop-bg)!important;
  box-shadow:0 0 0 2px rgba(74,222,128,.3);}
.tnode.dragging-node{opacity:.5;}
.tnode-label{font-size:12px;font-weight:600;color:var(--text);}
.tnode-iri{font-size:10px;color:var(--text-muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.tnode-poly{font-size:9px;background:var(--warn);color:#1a1d2e;border-radius:3px;padding:1px 4px;align-self:flex-start;}
.tnode-collapse{position:absolute;bottom:-9px;left:50%;transform:translateX(-50%);
  width:18px;height:18px;background:var(--panel2);border:1px solid var(--border);
  border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:9px;cursor:pointer;z-index:2;color:var(--text-dim);}
.tnode-collapse:hover{border-color:var(--accent);color:var(--accent);}

/* ── SVG CONNECTORS ── */
.tree-svg{position:absolute;top:0;left:0;pointer-events:none;overflow:visible;}

/* ── LR (LEFT-RIGHT) VIEW ── */
.lr-wrap{display:flex;flex-direction:column;gap:0;}
.lr-node-row{display:flex;align-items:flex-start;gap:0;}
.lr-node{background:var(--node-bg);border:1.5px solid var(--node-border);
  border-radius:8px;padding:7px 11px;min-width:140px;max-width:220px;
  cursor:pointer;user-select:none;transition:all .15s;position:relative;flex-shrink:0;}
.lr-node:hover{border-color:var(--accent);}
.lr-node.selected{border-color:var(--accent);box-shadow:0 0 0 2px rgba(124,131,245,.3);}
.lr-node.top-concept{border-color:var(--accent2);}
.lr-node.drop-target{border-color:var(--drop)!important;background:var(--drop-bg)!important;}
.lr-node.dragging-node{opacity:.5;}
.lr-node-label{font-size:12px;font-weight:600;}
.lr-node-iri{font-size:10px;color:var(--text-muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:200px;}
.lr-children{display:flex;flex-direction:column;gap:4px;margin-left:28px;padding-left:12px;
  border-left:1.5px solid var(--connector);margin-top:4px;padding-top:4px;padding-bottom:4px;}
.lr-connector-h{width:16px;height:1.5px;background:var(--connector);flex-shrink:0;margin-top:13px;}
.lr-indent{display:flex;flex-direction:column;}
.lr-collapse{position:absolute;right:-9px;top:50%;transform:translateY(-50%);
  width:16px;height:16px;background:var(--panel2);border:1px solid var(--border);
  border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:9px;cursor:pointer;z-index:2;color:var(--text-dim);}
.lr-collapse:hover{border-color:var(--accent);color:var(--accent);}

/* ── CANVAS DROP ZONE (root) ── */
.canvas-drop-root{min-height:60px;border:2px dashed transparent;border-radius:8px;
  margin:8px;transition:all .2s;display:flex;align-items:center;justify-content:center;
  font-size:11px;color:var(--text-muted);}
.canvas-drop-root.active{border-color:var(--drop);background:var(--drop-bg);color:var(--drop);}

/* ── DIFF MODAL ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;
  align-items:center;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:var(--panel);border:1px solid var(--border);border-radius:10px;
  width:560px;max-width:96vw;max-height:80vh;display:flex;flex-direction:column;overflow:hidden;}
.modal-hdr{padding:14px 18px;font-size:13px;font-weight:700;border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:8px;}
.modal-body{flex:1;overflow-y:auto;padding:16px 18px;display:flex;flex-direction:column;gap:12px;}
.diff-section{font-size:11px;}
.diff-section h4{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;
  color:var(--text-dim);margin-bottom:6px;}
.diff-line{font-family:var(--mono);font-size:11px;padding:2px 6px;border-radius:3px;margin:1px 0;}
.diff-ins{background:rgba(74,222,128,.1);color:#4ade80;}
.diff-del{background:rgba(248,113,113,.1);color:#f87171;}
.diff-empty{color:var(--text-muted);font-size:11px;font-style:italic;}
.modal-ftr{padding:12px 18px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;}

/* ── TOAST ── */
.toast-wrap{position:fixed;bottom:16px;right:16px;display:flex;flex-direction:column;gap:6px;z-index:200;}
.toast{background:var(--panel2);border:1px solid var(--border);border-radius:6px;
  padding:8px 14px;font-size:12px;max-width:320px;animation:fadeIn .2s;}
.toast.success{border-color:var(--success);color:var(--success);}
.toast.error{border-color:var(--danger);color:var(--danger);}
.toast.info{border-color:var(--accent);color:var(--accent);}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* scrollbars */
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="brand">Taxonomy Tree <span>| Enabling Value</span></div>
  <div id="conn-status" class="conn-status" title="Not connected"></div>
  <input type="text" id="sparql-endpoint" placeholder="/graphdb/repositories/value-kb" style="width:260px;">
  <select id="scheme-select" onchange="onSchemeChange(this.value)"
    style="background:var(--panel2);border:1px solid var(--border);color:var(--text);border-radius:var(--radius);padding:5px 9px;font-size:12px;max-width:220px;display:none;">
    <option value="">— select taxonomy —</option>
  </select>
  <button class="btn btn-sm" onclick="connectThenLoad()">Connect &amp; Load</button>
  <div class="spacer"></div>
  <div class="view-toggle">
    <button id="btn-td" class="active" onclick="setView('td')" title="Top-Down tree">⬇ Top-Down</button>
    <button id="btn-lr" onclick="setView('lr')" title="Left-Right tree">➡ Left-Right</button>
  </div>
  <button class="btn btn-sm" onclick="expandAll()">Expand All</button>
  <button class="btn btn-sm" onclick="collapseAll()">Collapse All</button>
  <button id="btn-save-graphdb" class="btn btn-sm btn-primary" onclick="saveToGraphDB()" style="display:none">💾 Save to GraphDB</button>
</div>

<!-- WORKSPACE -->
<div class="workspace">
  <!-- LEFT: concept list -->
  <div class="left-panel">
    <div class="panel-hdr">
      <span>Concepts</span>
      <input type="text" id="filter-input" placeholder="Filter…" oninput="renderAll()">
    </div>
    <div class="concept-list" id="concept-list"></div>
  </div>
  <div class="resizer" id="resizer"></div>

  <!-- CANVAS -->
  <div class="canvas-area" id="canvas-area">
    <div class="canvas-inner" id="canvas-inner">
      <div class="canvas-empty">Connect to GraphDB and load a taxonomy scheme.</div>
    </div>
  </div>
</div>

<!-- DIFF MODAL -->
<div class="modal-overlay" id="diff-modal">
  <div class="modal">
    <div class="modal-hdr">⚡ Preview Changes</div>
    <div class="modal-body" id="diff-body"></div>
    <div class="modal-ftr">
      <button class="btn" onclick="closeDiff()">Cancel</button>
      <button class="btn btn-primary" onclick="confirmSave()">Confirm &amp; Save to GraphDB</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast-wrap" id="toast-wrap"></div>

<script>
// ═══════════════════════════════════════════════════════════
//  CONSTANTS
// ═══════════════════════════════════════════════════════════
const SKOS = 'http://www.w3.org/2004/02/skos/core#';

// ═══════════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════════
let schemeData = {
  iri: '', base: '', title: '',
  concepts: {}   // id -> { id, iri, prefLabel, broader:[], note }
};
let loadedSchemeIri = null;
let namedGraph = null;
let selectedId = null;
let collapsed = new Set();
let view = 'td';  // 'td' | 'lr'
let baseline = {};
let dragState = null; // { id, fromPanel }

function concepts() { return schemeData.concepts; }
function rnd() { return Math.random().toString(36).slice(2,8); }

// ═══════════════════════════════════════════════════════════
//  CONNECTION — reused exactly from tax-editor.html
// ═══════════════════════════════════════════════════════════
function setConnStatus(s) {
  const el = document.getElementById('conn-status');
  el.className = 'conn-status ' + (s||'');
}

async function sparqlSelect(query) {
  let ep = document.getElementById('sparql-endpoint').value.trim();
  if (!ep) throw new Error('No endpoint configured');
  ep = ep.replace(/^https?:\/\/localhost:\d+/, '');
  if (!ep.startsWith('/')) ep = '/' + ep;
  const body = new URLSearchParams({ query });
  if (namedGraph) body.set('context', '<' + namedGraph + '>');
  const r = await fetch(ep, {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded', 'Accept': 'application/sparql-results+json' },
    body
  });
  if (!r.ok) { const t = await r.text(); throw new Error('SPARQL ' + r.status + ': ' + t); }
  return r.json();
}

async function sparqlUpdate(update) {
  let ep = document.getElementById('sparql-endpoint').value.trim();
  ep = ep.replace(/^https?:\/\/localhost:\d+/, '');
  if (!ep.startsWith('/')) ep = '/' + ep;
  ep = ep.replace(/\/$/, '') + '/statements';
  const r = await fetch(ep, {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body: 'update=' + encodeURIComponent(update)
  });
  if (!r.ok) throw new Error('Update ' + r.status + ': ' + (await r.text()));
}

// If scheme is already known (from URL params), load directly.
// Otherwise, discover taxonomy schemes from repo and show a selector.
async function connectThenLoad() {
  if (loadedSchemeIri) {
    // Launched from Model Manager with ?scheme= — load directly, no selector needed
    await connectAndLoad();
  } else {
    // Standalone: query repo for taxonomy-type ConceptSchemes
    setConnStatus('loading');
    try {
      const q = `PREFIX skos: <${SKOS}>
SELECT DISTINCT ?s ?label WHERE {
  ?s a skos:ConceptScheme .
  OPTIONAL { ?s <http://www.w3.org/2000/01/rdf-schema#label> ?label }
  OPTIONAL { ?s <http://www.w3.org/2004/02/skos/core#prefLabel> ?label }
  FILTER(CONTAINS(LCASE(STR(?s)), "tax"))
} ORDER BY ?label`;
      const r = await sparqlSelect(q);
      const sel = document.getElementById('scheme-select');
      sel.innerHTML = '<option value="">— select taxonomy —</option>';
      r.results.bindings.forEach(b => {
        const iri = b.s.value;
        const label = b.label?.value || iri.split(/[#/]/).pop();
        const opt = document.createElement('option');
        opt.value = iri; opt.textContent = label;
        sel.appendChild(opt);
      });
      if (r.results.bindings.length === 1) {
        // Only one taxonomy — auto-select and load
        const iri = r.results.bindings[0].s.value;
        onSchemeChange(iri);
        sel.value = iri;
        await connectAndLoad();
      } else if (r.results.bindings.length > 1) {
        sel.style.display = 'inline-block';
        setConnStatus('connected');
        toast('Select a taxonomy to load', 'info');
      } else {
        // No "tax" match — show all ConceptSchemes
        const q2 = `PREFIX skos: <${SKOS}> SELECT DISTINCT ?s ?label WHERE { ?s a skos:ConceptScheme . OPTIONAL { ?s <http://www.w3.org/2000/01/rdf-schema#label> ?label } } ORDER BY ?label`;
        const r2 = await sparqlSelect(q2);
        r2.results.bindings.forEach(b => {
          const iri = b.s.value;
          const label = b.label?.value || iri.split(/[#/]/).pop();
          const opt = document.createElement('option');
          opt.value = iri; opt.textContent = label;
          sel.appendChild(opt);
        });
        sel.style.display = 'inline-block';
        setConnStatus('connected');
        toast('No taxonomy-specific schemes found — showing all schemes', 'info');
      }
    } catch(e) {
      setConnStatus('error');
      toast('Connect failed: ' + e.message, 'error');
    }
  }
}

function onSchemeChange(iri) {
  if (!iri) return;
  loadedSchemeIri = iri;
  const base = iri.includes('#')
    ? iri.replace(/#.*$/, '#')
    : iri.replace(/\/[^/]*$/, '/');
  schemeData = { iri, base, title: (iri.split('/').filter(Boolean).pop()||'Taxonomy').split('#')[0], concepts: {} };
}

async function connectAndLoad() {
  if (!loadedSchemeIri) { toast('Please select a taxonomy scheme first', 'error'); return; }
  setConnStatus('loading');
  try {
    const s = schemeData;
    const nsBase = s.base;
    const schemeIri = loadedSchemeIri;
    const G = '<' + schemeIri + '>';
    console.log('[load] schemeIri:', schemeIri, 'nsBase:', nsBase, 'namedGraph:', namedGraph);

    const qGraph = `PREFIX skos: <${SKOS}>
SELECT ?c ?pref ?note WHERE {
  GRAPH ${G} {
    ?c a skos:Concept .
    OPTIONAL { ?c skos:prefLabel ?pref . FILTER(LANG(?pref)='en' || LANG(?pref)='') }
    OPTIONAL { ?c skos:scopeNote ?note }
  }
}`;
    const qNs = `PREFIX skos: <${SKOS}>
SELECT ?c ?pref ?note WHERE {
  ?c a skos:Concept .
  FILTER(STRSTARTS(STR(?c), "${nsBase}"))
  OPTIONAL { ?c skos:prefLabel ?pref . FILTER(LANG(?pref)='en' || LANG(?pref)='') }
  OPTIONAL { ?c skos:scopeNote ?note }
}`;

    let usedGraph = true;
    let r1 = await sparqlSelect(qGraph);
    console.log('[load] graph query returned:', r1.results.bindings.length, 'rows');
    if (!r1.results.bindings.length) {
      usedGraph = false;
      r1 = await sparqlSelect(qNs);
      console.log('[load] ns fallback returned:', r1.results.bindings.length, 'rows');
    }

    const byIri = {}, newConcepts = {};
    r1.results.bindings.forEach(b => {
      const iri = b.c.value;
      let c = byIri[iri];
      if (!c) {
        const id = 'c_' + rnd();
        c = { id, iri, prefLabel: '', broader: [], note: '' };
        byIri[iri] = c; newConcepts[id] = c;
      }
      if (b.pref && !c.prefLabel) c.prefLabel = b.pref.value;
      if (b.note && !c.note)      c.note = b.note.value;
    });
    Object.values(newConcepts).forEach(c => {
      if (!c.prefLabel) c.prefLabel = c.iri.split(/[#/]/).pop();
    });

    const relWrap = t => usedGraph
      ? `GRAPH ${G} { ${t} }`
      : `${t} FILTER(STRSTARTS(STR(?c), "${nsBase}"))`;

    // broader
    const r2 = await sparqlSelect(`PREFIX skos: <${SKOS}> SELECT ?c ?b WHERE { ${relWrap('?c skos:broader ?b .')} }`);
    const idByIri = {}; Object.values(newConcepts).forEach(c => idByIri[c.iri] = c.id);
    r2.results.bindings.forEach(b => {
      const child = byIri[b.c.value], parId = idByIri[b.b?.value];
      if (child && parId && !child.broader.includes(parId)) child.broader.push(parId);
    });

    // hasTopConcept — mark top concepts explicitly (broader stays empty)
    try {
      const r3 = await sparqlSelect(`PREFIX skos: <${SKOS}> SELECT ?c WHERE { ${relWrap('<'+schemeIri+'> skos:hasTopConcept ?c .')} }`);
      r3.results.bindings.forEach(b => {
        const c = byIri[b.c.value];
        if (c) c.isTopConcept = true;
      });
    } catch(e) {}

    schemeData.concepts = newConcepts;
    selectedId = null; collapsed = new Set();
    snapshotBaseline();
    document.getElementById('btn-save-graphdb').style.display = 'inline-block';
    setConnStatus('connected');
    renderAll();
    toast('Loaded ' + Object.keys(newConcepts).length + ' concepts', 'success');
  } catch(e) {
    setConnStatus('error');
    toast('Load failed: ' + e.message, 'error');
  }
}

// ═══════════════════════════════════════════════════════════
//  HIERARCHY HELPERS
// ═══════════════════════════════════════════════════════════
function childrenOf(id) {
  return Object.values(concepts()).filter(c => c.broader.includes(id));
}
function topConcepts() {
  return Object.values(concepts()).filter(c => !c.broader || !c.broader.length);
}
function isAncestor(ancestorId, descendantId, visited = new Set()) {
  if (visited.has(descendantId)) return false;
  visited.add(descendantId);
  const c = concepts()[descendantId];
  if (!c) return false;
  if ((c.broader||[]).includes(ancestorId)) return true;
  return (c.broader||[]).some(b => isAncestor(ancestorId, b, visited));
}
function parentCount(id) { return (concepts()[id]?.broader||[]).length; }

// ═══════════════════════════════════════════════════════════
//  BASELINE / DIFF
// ═══════════════════════════════════════════════════════════
function lit(s) { return '"' + String(s).replace(/\\/g,'\\\\').replace(/"/g,'\\"').replace(/\n/g,'\\n') + '"'; }

function tripleStrings(c, schemeIri) {
  const t = new Set();
  const S = '<' + c.iri + '>';
  t.add(`${S} a skos:Concept`);
  t.add(`${S} skos:inScheme <${schemeIri}>`);
  if (c.prefLabel) t.add(`${S} skos:prefLabel ${lit(c.prefLabel)}@en`);
  (c.broader||[]).forEach(bid => {
    const b = concepts()[bid];
    if (b) t.add(`${S} skos:broader <${b.iri}>`);
  });
  if (!c.broader || !c.broader.length) {
    t.add(`${S} skos:topConceptOf <${schemeIri}>`);
    t.add(`<${schemeIri}> skos:hasTopConcept ${S}`);
  }
  return t;
}

function snapshotBaseline() {
  baseline = {};
  const sIri = loadedSchemeIri || schemeData.iri;
  Object.values(concepts()).forEach(c => { baseline[c.iri] = tripleStrings(c, sIri); });
}

function computeDiff() {
  const sIri = loadedSchemeIri || schemeData.iri;
  const cur = {};
  Object.values(concepts()).forEach(c => { cur[c.iri] = tripleStrings(c, sIri); });
  const toInsert = new Set(), toDelete = new Set();
  Object.keys(cur).forEach(iri => {
    const now = cur[iri], was = baseline[iri] || new Set();
    now.forEach(tp => { if (!was.has(tp)) toInsert.add(tp); });
    was.forEach(tp => { if (!now.has(tp)) toDelete.add(tp); });
  });
  Object.keys(baseline).forEach(iri => {
    if (!cur[iri]) baseline[iri].forEach(tp => toDelete.add(tp));
  });
  return { toInsert: [...toInsert], toDelete: [...toDelete] };
}

// ═══════════════════════════════════════════════════════════
//  DIFF MODAL
// ═══════════════════════════════════════════════════════════
function showDiff() {
  const { toInsert, toDelete } = computeDiff();
  if (!toInsert.length && !toDelete.length) { toast('No hierarchy changes to save', 'info'); return; }
  const body = document.getElementById('diff-body');
  let html = '';
  if (toDelete.length) {
    html += `<div class="diff-section"><h4>Remove (${toDelete.length} triples)</h4>`;
    toDelete.forEach(t => { html += `<div class="diff-line diff-del">− ${esc(t)} .</div>`; });
    html += '</div>';
  }
  if (toInsert.length) {
    html += `<div class="diff-section"><h4>Add (${toInsert.length} triples)</h4>`;
    toInsert.forEach(t => { html += `<div class="diff-line diff-ins">+ ${esc(t)} .</div>`; });
    html += '</div>';
  }
  body.innerHTML = html;
  document.getElementById('diff-modal').classList.add('open');
}

function closeDiff() { document.getElementById('diff-modal').classList.remove('open'); }

async function confirmSave() {
  closeDiff();
  await saveToGraphDB();
}

async function saveToGraphDB() {
  const { toInsert, toDelete } = computeDiff();
  if (!toInsert.length && !toDelete.length) { toast('No changes to save', 'info'); return; }
  setConnStatus('loading');
  const PFX = `PREFIX skos: <${SKOS}>\n`;
  try {
    const sIri = loadedSchemeIri || schemeData.iri;
    const G = '<' + sIri + '>';
    if (toDelete.length) {
      await sparqlUpdate(PFX + 'DELETE DATA {\n  GRAPH ' + G + ' {\n    ' + toDelete.join(' .\n    ') + ' .\n  }\n}');
    }
    if (toInsert.length) {
      await sparqlUpdate(PFX + 'INSERT DATA {\n  GRAPH ' + G + ' {\n    ' + toInsert.join(' .\n    ') + ' .\n  }\n}');
    }
    snapshotBaseline();
    setConnStatus('connected');
    toast(`Saved: +${toInsert.length} / −${toDelete.length} triples`, 'success');
  } catch(e) {
    setConnStatus('error');
    toast('Save failed: ' + e.message, 'error');
  }
}

// ═══════════════════════════════════════════════════════════
//  DRAG & DROP
// ═══════════════════════════════════════════════════════════
function onDragStart(e, id, fromPanel) {
  dragState = { id, fromPanel };
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', id);
  setTimeout(() => {
    const el = document.querySelector(`[data-id="${id}"]`);
    if (el) el.classList.add(fromPanel ? 'dragging-source' : 'dragging-node');
  }, 0);
}

function onDragEnd() {
  document.querySelectorAll('.dragging-source,.dragging-node,.drop-target').forEach(el => {
    el.classList.remove('dragging-source','dragging-node','drop-target');
  });
  dragState = null;
}

function onDragOver(e, targetId) {
  e.preventDefault();
  if (!dragState) return;
  if (dragState.id === targetId) return;
  if (isAncestor(dragState.id, targetId)) return; // prevent cycles
  e.dataTransfer.dropEffect = 'move';
  document.querySelectorAll('.drop-target').forEach(el => el.classList.remove('drop-target'));
  const el = document.querySelector(`[data-id="${targetId}"][data-node]`);
  if (el) el.classList.add('drop-target');
}

function onDrop(e, targetId) {
  e.preventDefault();
  document.querySelectorAll('.drop-target').forEach(el => el.classList.remove('drop-target'));
  if (!dragState) return;
  const { id: dragId, fromPanel } = dragState;
  dragState = null;
  if (dragId === targetId) return;
  if (isAncestor(dragId, targetId)) { toast('Cannot move a concept under its own descendant', 'error'); return; }

  const c = concepts()[dragId];
  if (!c) return;

  const oldBroaders = [...(c.broader||[])];
  if (fromPanel) {
    // From left panel: add targetId as additional broader (poly-hierarchy)
    if (!c.broader.includes(targetId)) c.broader.push(targetId);
  } else {
    // From tree: replace the single broader (or set first broader to target)
    // Keep poly-hierarchy if multiple parents; replace the visual parent
    c.broader = [targetId];
  }

  renderAll();
  showDiff();
}

function onDropCanvas(e) {
  // Drop onto empty canvas = make top concept (no broader)
  e.preventDefault();
  document.querySelectorAll('.drop-target,.canvas-drop-root').forEach(el => {
    el.classList.remove('drop-target','active');
  });
  if (!dragState) return;
  const { id: dragId } = dragState;
  dragState = null;
  const c = concepts()[dragId];
  if (!c) return;
  c.broader = [];
  renderAll();
  showDiff();
}

// ═══════════════════════════════════════════════════════════
//  RENDER — LEFT PANEL
// ═══════════════════════════════════════════════════════════
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function renderLeft() {
  const filter = document.getElementById('filter-input').value.toLowerCase();
  const all = Object.values(concepts()).sort((a,b) => a.prefLabel.localeCompare(b.prefLabel));
  const filtered = filter ? all.filter(c => c.prefLabel.toLowerCase().includes(filter) || c.iri.toLowerCase().includes(filter)) : all;
  const unplaced = new Set(Object.values(concepts()).filter(c => !c.broader?.length && !childrenOf(c.id).length).map(c=>c.id));

  document.getElementById('concept-list').innerHTML = filtered.map(c => `
    <div class="concept-item ${unplaced.has(c.id)?'unplaced':''}"
      draggable="true"
      data-id="${c.id}"
      ondragstart="onDragStart(event,'${c.id}',true)"
      ondragend="onDragEnd()"
      onclick="selectConcept('${c.id}')">
      <div style="flex:1;overflow:hidden">
        <div class="ci-label">${esc(c.prefLabel)}</div>
        <div class="ci-iri">${esc(c.iri.split(/[#/]/).pop())}</div>
      </div>
      ${parentCount(c.id)>1?`<span class="ci-badge">poly</span>`:''}
      ${c.broader?.length?'':childrenOf(c.id).length?'':unplaced.has(c.id)?'<span class="ci-badge" style="border-color:var(--warn);color:var(--warn)">unplaced</span>':''}
    </div>`).join('');
}

// ═══════════════════════════════════════════════════════════
//  RENDER — TOP-DOWN TREE
// ═══════════════════════════════════════════════════════════
function renderTopDown() {
  const tops = topConcepts();
  if (!tops.length) {
    document.getElementById('canvas-inner').innerHTML =
      `<div class="canvas-drop-root" ondragover="event.preventDefault();this.classList.add('active')" ondrop="onDropCanvas(event)" ondragleave="this.classList.remove('active')">Drop a concept here to make it a top concept</div>
       <div class="canvas-empty">No top concepts found. Drag concepts from the left panel.</div>`;
    return;
  }

  let html = `<div class="canvas-drop-root" ondragover="event.preventDefault();this.classList.add('active')" ondrop="onDropCanvas(event)" ondragleave="this.classList.remove('active')">↑ Drop here to promote to top concept</div>`;
  html += `<div style="display:flex;gap:32px;padding:16px;flex-wrap:wrap;align-items:flex-start;">`;
  tops.forEach(c => { html += renderNodeTD(c.id, null, new Set()); });
  html += `</div>`;
  document.getElementById('canvas-inner').innerHTML = html;
}

function renderNodeTD(id, parentId, visited) {
  if (visited.has(id)) return `<div style="color:var(--danger);font-size:10px">⚠ cycle</div>`;
  visited = new Set(visited); visited.add(id);
  const c = concepts()[id];
  if (!c) return '';
  const kids = childrenOf(id);
  const isCollapsed = collapsed.has(id);
  const poly = parentCount(id) > 1;
  const isTop = !c.broader?.length;
  const sel = selectedId === id;

  let html = `<div class="node-wrap">
    <div class="tnode ${isTop?'top-concept':''} ${sel?'selected':''}"
      data-id="${id}" data-node="1"
      draggable="true"
      ondragstart="onDragStart(event,'${id}',false)"
      ondragend="onDragEnd()"
      ondragover="onDragOver(event,'${id}')"
      ondrop="onDrop(event,'${id}')"
      onclick="selectConcept('${id}')"
      style="cursor:pointer">
      <div class="tnode-label">${esc(c.prefLabel)}</div>
      <div class="tnode-iri">${esc(c.iri.split(/[#/]/).pop())}</div>
      ${poly?`<span class="tnode-poly">poly ×${parentCount(id)}</span>`:''}
    </div>`;

  if (kids.length) {
    html += `<div class="tnode-collapse" onclick="toggleCollapse('${id}',event)" title="${isCollapsed?'Expand':'Collapse'}">${isCollapsed?'▶':'▼'}</div>`;
    if (!isCollapsed) {
      html += `<div style="width:1.5px;height:16px;background:var(--connector);margin:0 auto;"></div>`;
      html += `<div style="display:flex;gap:20px;align-items:flex-start;">`;
      kids.forEach(k => { html += renderNodeTD(k.id, id, visited); });
      html += `</div>`;
    }
  }
  html += `</div>`;
  return html;
}

// ═══════════════════════════════════════════════════════════
//  RENDER — LEFT-RIGHT TREE
// ═══════════════════════════════════════════════════════════
function renderLeftRight() {
  const tops = topConcepts();
  if (!tops.length) {
    document.getElementById('canvas-inner').innerHTML =
      `<div class="canvas-drop-root" ondragover="event.preventDefault();this.classList.add('active')" ondrop="onDropCanvas(event)" ondragleave="this.classList.remove('active')">Drop a concept here to make it a top concept</div>
       <div class="canvas-empty">No top concepts found.</div>`;
    return;
  }

  let html = `<div class="canvas-drop-root" ondragover="event.preventDefault();this.classList.add('active')" ondrop="onDropCanvas(event)" ondragleave="this.classList.remove('active')">↑ Drop here to promote to top concept</div>`;
  html += `<div style="display:flex;flex-direction:column;gap:16px;padding:16px;">`;
  tops.forEach(c => { html += renderNodeLR(c.id, new Set()); });
  html += `</div>`;
  document.getElementById('canvas-inner').innerHTML = html;
}

function renderNodeLR(id, visited) {
  if (visited.has(id)) return `<span style="color:var(--danger);font-size:10px">⚠ cycle</span>`;
  visited = new Set(visited); visited.add(id);
  const c = concepts()[id];
  if (!c) return '';
  const kids = childrenOf(id);
  const isCollapsed = collapsed.has(id);
  const poly = parentCount(id) > 1;
  const isTop = !c.broader?.length;
  const sel = selectedId === id;

  let html = `<div class="lr-node-row">
    <div class="lr-node ${isTop?'top-concept':''} ${sel?'selected':''}"
      data-id="${id}" data-node="1"
      draggable="true"
      ondragstart="onDragStart(event,'${id}',false)"
      ondragend="onDragEnd()"
      ondragover="onDragOver(event,'${id}')"
      ondrop="onDrop(event,'${id}')"
      onclick="selectConcept('${id}')"
      style="cursor:pointer">
      <div class="lr-node-label">${esc(c.prefLabel)}</div>
      <div class="lr-node-iri">${esc(c.iri.split(/[#/]/).pop())}</div>
      ${poly?`<span class="tnode-poly">poly</span>`:''}
      ${kids.length?`<div class="lr-collapse" onclick="toggleCollapse('${id}',event)">${isCollapsed?'▶':'▼'}</div>`:''}
    </div>`;

  if (kids.length && !isCollapsed) {
    html += `<div class="lr-children">`;
    kids.forEach(k => {
      html += `<div style="display:flex;align-items:flex-start;">
        <div class="lr-connector-h"></div>
        ${renderNodeLR(k.id, visited)}
      </div>`;
    });
    html += `</div>`;
  }
  html += `</div>`;
  return html;
}

// ═══════════════════════════════════════════════════════════
//  CONTROLS
// ═══════════════════════════════════════════════════════════
function setView(v) {
  view = v;
  document.getElementById('btn-td').classList.toggle('active', v==='td');
  document.getElementById('btn-lr').classList.toggle('active', v==='lr');
  renderCanvas();
}

function toggleCollapse(id, e) {
  e.stopPropagation();
  if (collapsed.has(id)) collapsed.delete(id); else collapsed.add(id);
  renderCanvas();
}

function expandAll()   { collapsed.clear(); renderCanvas(); }
function collapseAll() {
  Object.keys(concepts()).forEach(id => { if (childrenOf(id).length) collapsed.add(id); });
  renderCanvas();
}

function selectConcept(id) {
  selectedId = id === selectedId ? null : id;
  renderAll();
}

function renderCanvas() {
  if (!Object.keys(concepts()).length) return;
  if (view === 'td') renderTopDown(); else renderLeftRight();
}

function renderAll() { renderLeft(); renderCanvas(); }

// ═══════════════════════════════════════════════════════════
//  TOAST
// ═══════════════════════════════════════════════════════════
function toast(msg, type='info') {
  const wrap = document.getElementById('toast-wrap');
  const el = document.createElement('div');
  el.className = 'toast ' + type;
  el.textContent = msg;
  wrap.appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

// ═══════════════════════════════════════════════════════════
//  RESIZER
// ═══════════════════════════════════════════════════════════
(function() {
  const r = document.getElementById('resizer');
  const ws = document.querySelector('.workspace');
  let dragging = false, startX = 0, startW = 0;
  r.addEventListener('mousedown', e => {
    dragging = true; startX = e.clientX;
    startW = parseInt(getComputedStyle(document.querySelector('.left-panel')).width, 10);
    document.body.style.cursor = 'col-resize'; document.body.style.userSelect = 'none';
  });
  window.addEventListener('mousemove', e => {
    if (!dragging) return;
    const w = Math.max(200, Math.min(420, startW + (e.clientX - startX)));
    document.documentElement.style.setProperty('--left-w', w + 'px');
  });
  window.addEventListener('mouseup', () => {
    dragging = false;
    document.body.style.cursor = ''; document.body.style.userSelect = '';
  });
})();

// ═══════════════════════════════════════════════════════════
//  KEYBOARD
// ═══════════════════════════════════════════════════════════
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    closeDiff();
    selectedId = null; renderAll();
  }
  if ((e.key === 's' || e.key === 'S') && (e.ctrlKey || e.metaKey)) {
    e.preventDefault(); showDiff();
  }
});

// ═══════════════════════════════════════════════════════════
//  AUTO-CONNECT FROM URL PARAMS (same as tax-editor.html)
// ═══════════════════════════════════════════════════════════
(function() {
  const params = new URLSearchParams(window.location.search);
  const ep    = params.get('endpoint');
  const sch   = params.get('scheme') || params.get('taxonomy') || params.get('ontology') || params.get('vocabulary');
  const graph = params.get('graph');

  if (ep) {
    let epClean = ep.replace(/^https?:\/\/[^/]+/, '');
    if (!epClean.startsWith('/graphdb/')) epClean = epClean.replace(/^\/repositories\//, '/graphdb/repositories/');
    document.getElementById('sparql-endpoint').value = epClean;
  }

  if (sch) {
    loadedSchemeIri = sch;
    // Match tax-editor.html's exact base derivation:
    // everything up to and including the # or the last /
    const base = sch.includes('#')
      ? sch.replace(/#.*$/, '#')
      : sch.replace(/\/[^/]*$/, '/');
    schemeData = { iri: sch, base, title: (sch.split('/').filter(Boolean).pop()||'Taxonomy').split('#')[0], concepts: {} };
    console.log('[init] scheme:', sch, 'base:', base, 'graph:', graph);
  }
  if (graph) namedGraph = graph;

  if (ep && sch) connectAndLoad(); else if (ep) connectThenLoad();
})();
