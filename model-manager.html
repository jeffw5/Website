<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Semantic Model Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-gray-100 flex h-screen overflow-hidden font-sans">

    <div id="sidebar" class="bg-gray-800 border-r border-gray-700 flex flex-col justify-between flex-shrink-0" style="width:320px;min-width:200px;max-width:640px;">
        <div class="p-4 flex-1 flex flex-col min-h-0">
            <h1 class="text-xl font-bold tracking-wider text-indigo-400 mb-6 flex items-center gap-2">
                📂 Model Manager
            </h1>
            
            <div class="bg-gray-850 p-3 rounded border border-gray-700 mb-4 text-xs space-y-2">
                <div>
                    <label class="block text-gray-400 font-semibold mb-1">GraphDB URL</label>
                    <input id="graphdbUrl" type="text" value="http://localhost:7200" class="w-full bg-gray-900 border border-gray-600 rounded p-1 text-gray-200 opacity-50" readonly>
                </div>
                <div>
                    <label class="block text-gray-400 font-semibold mb-1">Repository ID</label>
                    <input id="repoId" type="text" value="value-kb" class="w-full bg-gray-900 border border-gray-600 rounded p-1 text-gray-200">
                </div>
                <button onclick="refreshSidebar()" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-1 px-2 rounded tracking-wide transition">
                    Connect & Refresh
                </button>
            </div>

            <div class="flex border-b border-gray-700 text-sm mb-3">
                <button onclick="switchTab('vocab')" id="tab-vocab" class="flex-1 pb-2 border-b-2 border-indigo-500 font-medium text-indigo-400">📖 Voc</button>
                <button onclick="switchTab('tax')" id="tab-tax" class="flex-1 pb-2 border-b-2 border-transparent text-gray-400 hover:text-gray-200">🗂️ Tax</button>
                <button onclick="switchTab('owl')" id="tab-owl" class="flex-1 pb-2 border-b-2 border-transparent text-gray-400 hover:text-gray-200">⬡ Ont</button>
                <button onclick="switchTab('all')" id="tab-all" class="flex-1 pb-2 border-b-2 border-transparent text-gray-400 hover:text-gray-200" title="Assets that don't match the vocabulary/taxonomy/ontology naming convention — cleanup list">⚠ Other</button>
            </div>

            <div class="flex-1 overflow-y-auto overflow-x-hidden" id="modelListWrapper" style="overflow-x:scroll;scrollbar-width:none;">
                <div id="modelList" class="space-y-1 min-w-0">
                    <p class="text-gray-500 text-xs italic p-2">Click Connect & Refresh to load assets...</p>
                </div>
            </div>
            <!-- Horizontal scroll slider -->
            <div class="px-2 pt-1 pb-1 flex-shrink-0">
                <input type="range" id="listScrollSlider" min="0" max="100" value="0"
                    class="w-full h-1.5 accent-indigo-500 cursor-pointer"
                    oninput="scrollListHorizontal(this.value)"
                    style="accent-color:#6366f1;">
            </div>
        </div>

        <div class="p-4 border-t border-gray-700 bg-gray-850">
            <button onclick="prepareCreateNew()" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-2 px-4 rounded tracking-wide transition flex justify-center items-center gap-2">
                ➕ Create New Asset
            </button>
        </div>
    </div>

    <!-- Drag handle to resize the sidebar -->
    <div id="sidebar-resizer" class="flex-shrink-0" style="width:6px;cursor:col-resize;background:#374151;" title="Drag to resize"></div>

    <div class="flex-1 flex flex-col bg-gray-900">
        <div class="h-16 border-b border-gray-700 flex items-center justify-between px-6 bg-gray-850">
            <div>
                <h2 id="currentAssetTitle" class="text-lg font-semibold text-gray-200">No Asset Selected</h2>
                <p id="currentAssetUri" class="text-xs text-gray-500 italic"></p>
            </div>
            <div class="flex gap-3">
                <button id="btnVisualize" onclick="openVisualizer()" disabled class="bg-cyan-600 opacity-50 cursor-not-allowed text-white font-bold py-2 px-4 rounded text-sm transition">
                    🕸️ Visualize
                </button>
                <button id="btnMetadata" onclick="openMetadataEditor()" disabled class="bg-amber-600 opacity-50 cursor-not-allowed text-white font-bold py-2 px-4 rounded text-sm transition">
                    📝 Edit Metadata
                </button>
                <button id="btnEditNodes" onclick="openModelEditor()" disabled class="bg-violet-600 opacity-50 cursor-not-allowed text-white font-bold py-2 px-4 rounded text-sm transition">
                    ⬡ Edit Nodes
                </button>
                <button id="btnVocEditor" onclick="openVocEditor()" disabled class="hidden bg-emerald-600 opacity-50 cursor-not-allowed text-white font-bold py-2 px-4 rounded text-sm transition">
                    📖 Voc Editor
                </button>
                <button id="btnTaxEditor" onclick="openTaxEditor()" disabled class="hidden bg-teal-600 opacity-50 cursor-not-allowed text-white font-bold py-2 px-4 rounded text-sm transition">
                    🗂️ Tax Editor
                </button>
                <button id="btnSave" onclick="saveAsset()" disabled class="bg-indigo-600 opacity-50 cursor-not-allowed text-white font-bold py-2 px-4 rounded text-sm transition">
                    💾 Save changes
                </button>
                <button id="btnDelete" onclick="deleteAsset()" disabled class="bg-rose-600 opacity-50 cursor-not-allowed text-white font-bold py-2 px-4 rounded text-sm transition">
                    🗑️ Delete Asset
                </button>
            </div>
        </div>

        <div class="flex-1 p-6 flex flex-col gap-4 overflow-hidden min-h-0">
            <div id="metaPanel" class="hidden bg-gray-800 p-4 rounded border border-gray-700 space-y-3">
                <h3 class="text-sm font-bold text-emerald-400 uppercase tracking-wider">New Asset Configurations</h3>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs text-gray-400 mb-1">Target Named Graph URI</label>
                        <input id="newGraphUri" type="text" placeholder="http://example.org/my-graph" class="w-full bg-gray-900 border border-gray-600 rounded p-2 text-sm">
                    </div>
                    <div>
                        <label class="block text-xs text-gray-400 mb-1">Asset Type</label>
                        <select id="newGraphType" class="w-full bg-gray-900 border border-gray-600 rounded p-2 text-sm text-gray-300">
                            <option value="vocab">SKOS Vocabulary</option>
                            <option value="tax">SKOS Taxonomy</option>
                            <option value="owl">OWL Ontology</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="flex-1 flex flex-col min-h-0">
                <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Turtle (.ttl) Serialization</label>
                <textarea id="ttlEditor" placeholder="# Select an asset or click Create New to write Turtle code here..." class="w-full flex-1 min-h-0 overflow-y-auto bg-gray-950 text-emerald-400 font-mono text-sm p-4 rounded border border-gray-700 focus:outline-none focus:border-indigo-500 resize-none"></textarea>
            </div>
        </div>
    </div>

    <script>
        let currentTab = 'vocab'; // 'vocab', 'tax', or 'owl'
        let selectedGraphUri = null;
        let isCreateMode = false;

        function scrollListHorizontal(val) {
            const wrapper = document.getElementById('modelListWrapper');
            const list    = document.getElementById('modelList');
            const maxScroll = list.scrollWidth - wrapper.clientWidth;
            if (maxScroll > 0) {
                wrapper.scrollLeft = (val / 100) * maxScroll;
            }
        }

        // Reset slider when list refreshes
        function resetSlider() {
            const slider = document.getElementById('listScrollSlider');
            if (slider) { slider.value = 0; }
            const wrapper = document.getElementById('modelListWrapper');
            if (wrapper) { wrapper.scrollLeft = 0; }
        }

        function getBaseUrl() {
            const repo = document.getElementById('repoId').value;
            return `/graphdb/repositories/${repo}`;
        }

        function switchTab(tab) {
            currentTab = tab;
            const active = "flex-1 pb-2 border-b-2 border-indigo-500 font-medium text-indigo-400";
            const idle   = "flex-1 pb-2 border-b-2 border-transparent text-gray-400 hover:text-gray-200";
            document.getElementById('tab-vocab').className = tab === 'vocab' ? active : idle;
            document.getElementById('tab-tax').className   = tab === 'tax'   ? active : idle;
            document.getElementById('tab-owl').className    = tab === 'owl'   ? active : idle;
            document.getElementById('tab-all').className    = tab === 'all'   ? active : idle;
            refreshSidebar();
        }

        // Compliance rule (single source of truth, used to classify every graph):
        //   compliant = URI starts with the enablingvalue host AND contains a type keyword.
        //   Voc / Tax / Ont = compliant assets carrying that keyword.
        //   Other = the exact complement: every graph NOT in Voc ∪ Tax ∪ Ont.
        const COMPLIANT_HOST = "https://www.enablingvalue.com/";
        function classifyGraph(uri) {
            const u = (uri || '').toLowerCase();
            const compliantHost = u.startsWith(COMPLIANT_HOST.toLowerCase());
            if (compliantHost && u.includes('vocabular')) return 'vocab';
            if (compliantHost && u.includes('taxonom'))   return 'tax';
            if (compliantHost && u.includes('ontolog'))   return 'owl';
            return 'other';   // wrong host, or right host but no type keyword
        }

        // 1. READ / REVIEW: list model RESOURCES by rdf:type from ALL locations —
        // default graph, named graphs, and FROM NAMED — so nothing is missed.
        async function refreshSidebar() {
            const endpoint = getBaseUrl();

            // Cast the widest possible net:
            // Branch 1: type triple in the default graph (no GRAPH clause)
            // Branch 2: type triple inside any named graph
            // Both ConceptScheme and Ontology, UNION'd so one query covers everything.
            const allGraphsQuery = `PREFIX skos: <http://www.w3.org/2004/02/skos/core#>
                   PREFIX owl:  <http://www.w3.org/2002/07/owl#>
                   PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
                   SELECT DISTINCT ?graph ?label WHERE {
                     {
                       { ?graph a skos:ConceptScheme } UNION { ?graph a owl:Ontology }
                       OPTIONAL { ?graph rdfs:label ?label }
                     }
                     UNION
                     {
                       GRAPH ?g {
                         { ?graph a skos:ConceptScheme } UNION { ?graph a owl:Ontology }
                         OPTIONAL { ?graph rdfs:label ?label }
                       }
                     }
                   } ORDER BY ?graph`;

            try {
                const response = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/x-www-form-urlencoded',
                        'Accept': 'application/sparql-results+json'
                    },
                    body: new URLSearchParams({ query: allGraphsQuery })
                });

                if(!response.ok) throw new Error("Connection failed");
                const data = await response.json();
                const filtered = data.results.bindings.filter(b => {
                    const kind = classifyGraph(b.graph.value);
                    // 'all' tab = the Other/catch-all bucket (classifyGraph returns 'other')
                    return currentTab === 'all' ? kind === 'other' : kind === currentTab;
                });
                console.log('[refreshSidebar] tab=', currentTab,
                    'total resources=', data.results.bindings.length,
                    'shown=', filtered.length);
                renderSidebarList(filtered);
                resetSlider();
            } catch (err) {
                alert("Error connecting to GraphDB. Verify local server, Repository ID, and CORS configuration settings.");
                console.error(err);
            }
        }

        function renderSidebarList(bindings) {
            const container = document.getElementById('modelList');
            container.innerHTML = '';

            if (bindings.length === 0) {
                container.innerHTML = `<p class="text-gray-500 text-xs italic p-2">No active entries found.</p>`;
                return;
            }

            bindings.forEach(binding => {
                const uri = binding.graph.value;
                const shortName = uri.split('/').pop().split('#').pop() || uri;
                
                const btn = document.createElement('button');
                btn.className = `block text-left p-2 rounded text-sm transition text-gray-300 hover:bg-gray-700 whitespace-nowrap ${selectedGraphUri === uri ? 'bg-indigo-900 border border-indigo-500 text-white' : ''}`;
                btn.style.minWidth = '100%';
                btn.innerText = `📄 ${shortName}`;
                btn.title = uri;
                btn.onclick = () => loadAssetDetails(uri);
                container.appendChild(btn);
            });
        }

        // 2. REVIEW: Fetch raw Turtle code using the Statements Graph Protocol API
        async function loadAssetDetails(uri) {
            isCreateMode = false;
            selectedGraphUri = uri;
            document.getElementById('metaPanel').classList.add('hidden');
            
            document.getElementById('currentAssetTitle').innerText = uri.split('/').pop().split('#').pop() || uri;
            document.getElementById('currentAssetUri').innerText = `Graph context: ${uri}`;

            if (!uri) { alert("No graph context for this asset."); return; }
            const statementsUrl = `${getBaseUrl()}/statements?context=${encodeURIComponent('<' + uri + '>')}`;

            try {
                const response = await fetch(statementsUrl, {
                    method: 'GET',
                    headers: { 'Accept': 'text/turtle' }
                });
                if(!response.ok) throw new Error("Could not pull serialization context.");
                const ttlData = await response.text();
                
                document.getElementById('ttlEditor').value = ttlData;
                toggleActionButtons(true);
                refreshSidebar();
            } catch (err) {
                alert("Failed to load RDF graph statements.");
            }
        }

        // Open the metadata editor in a new tab for the currently selected asset
        function openMetadataEditor() {
            if (!selectedGraphUri) {
                alert("No asset selected.");
                return;
            }
            const repo = document.getElementById('repoId').value;
            const metaFile = modelKindOf(selectedGraphUri) === 'onto'
                ? 'model-metadata-owl.html'
                : 'model-metadata-skos.html';
            const url = `${metaFile}?uri=${encodeURIComponent(selectedGraphUri)}&repo=${encodeURIComponent(repo)}`;
            window.open(url, '_blank');
        }

        // Open the visualizer in a new tab for the currently selected asset
        function openVisualizer() {
            if (!selectedGraphUri) {
                alert("No asset selected.");
                return;
            }
            const repo = document.getElementById('repoId').value;
            const url = `model-visualize.html?uri=${encodeURIComponent(selectedGraphUri)}&repo=${encodeURIComponent(repo)}`;
            window.open(url, '_blank');
        }

        // Open the model editor in a new tab for the currently selected OWL asset
        function openModelEditor() {
            if (!selectedGraphUri) {
                alert("No asset selected.");
                return;
            }
            const repo = document.getElementById('repoId').value;
            const graphdbUrl = document.getElementById('graphdbUrl').value;
            const endpoint = `${graphdbUrl}/repositories/${repo}`;
            const url = `model-editor.html`
                + `?endpoint=${encodeURIComponent(endpoint)}`
                + `&ontology=${encodeURIComponent(selectedGraphUri)}`
                + `&graph=${encodeURIComponent(selectedGraphUri)}`;
            window.open(url, '_blank');
        }

        // Detect model kind from the asset IRI's name (matches the editors' convention).
        // vocabulary-… → 'vocab', taxonomy-… → 'taxo', otherwise → 'onto'.
        function modelKindOf(uri) {
            const name = (uri || '').toLowerCase();
            if (/vocabular/.test(name)) return 'vocab';
            if (/taxonom/.test(name))   return 'taxo';
            return 'onto';
        }

        // Open the vocabulary editor for the selected vocabulary model
        function openVocEditor() {
            if (!selectedGraphUri) { alert("No asset selected."); return; }
            const repo = document.getElementById('repoId').value;
            const endpoint = `${document.getElementById('graphdbUrl').value}/repositories/${repo}`;
            const url = `voc-editor.html`
                + `?endpoint=${encodeURIComponent(endpoint)}`
                + `&scheme=${encodeURIComponent(selectedGraphUri)}`
                + `&graph=${encodeURIComponent(selectedGraphUri)}`;
            window.open(url, '_blank');
        }

        // Open the taxonomy editor for the selected taxonomy model
        function openTaxEditor() {
            if (!selectedGraphUri) { alert("No asset selected."); return; }
            const repo = document.getElementById('repoId').value;
            const endpoint = `${document.getElementById('graphdbUrl').value}/repositories/${repo}`;
            const url = `tax-editor.html`
                + `?endpoint=${encodeURIComponent(endpoint)}`
                + `&scheme=${encodeURIComponent(selectedGraphUri)}`
                + `&graph=${encodeURIComponent(selectedGraphUri)}`;
            window.open(url, '_blank');
        }

        function prepareCreateNew() {
            isCreateMode = true;
            selectedGraphUri = null;
            
            document.getElementById('currentAssetTitle').innerText = "Create New Asset Structure";
            document.getElementById('currentAssetUri').innerText = "Define metadata configuration and properties below.";
            document.getElementById('metaPanel').classList.remove('hidden');
            
            // Starter template setup
            document.getElementById('ttlEditor').value = `@prefix skos: <http://www.w3.org/2004/02/skos/core#> .\n@prefix owl: <http://www.w3.org/2002/07/owl#> .\n@prefix rdfs: <http://www.w3.org/2000/01/rdf-schema#> .\n\n# Construct your Turtle nodes below\n<http://example.org/sample-uri> a skos:ConceptScheme ;\n    rdfs:label "Sample Taxonomy Label" .`;
            toggleActionButtons(false);
            document.getElementById('btnSave').disabled = false;
            document.getElementById('btnSave').classList.remove('opacity-50', 'cursor-not-allowed');
            document.getElementById('btnMetadata').disabled = true;
            document.getElementById('btnMetadata').classList.add('opacity-50', 'cursor-not-allowed');
            document.getElementById('btnVisualize').disabled = true;
            document.getElementById('btnVisualize').classList.add('opacity-50', 'cursor-not-allowed');
        }

        // 3. CREATE & EDIT: Push the complete payload using PUT (Overwrites/Writes graph)
        async function saveAsset() {
            let targetUri = selectedGraphUri;
            
            if (isCreateMode) {
                targetUri = document.getElementById('newGraphUri').value.trim();
                if(!targetUri) {
                    alert("A complete target graph context URI string path is required!");
                    return;
                }
            }

            const statementsUrl = `${getBaseUrl()}/statements?context=${encodeURIComponent('<' + targetUri + '>')}`;
            const ttlPayload = document.getElementById('ttlEditor').value;

            try {
                const response = await fetch(statementsUrl, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'text/turtle' },
                    body: ttlPayload
                });

                if(response.ok) {
                    alert("Asset context pushed successfully!");
                    if(isCreateMode) {
                        currentTab = document.getElementById('newGraphType').value;
                        switchTab(currentTab);
                    }
                    loadAssetDetails(targetUri);
                } else {
                    throw new Error("Push payload modification rejected.");
                }
            } catch (err) {
                alert("Failed processing updates. Check Turtle syntax grammar rules.");
            }
        }

        // 4. DELETE: Remove ONLY the selected named graph. Hard-guarded against
        // unscoped deletes — an empty/blank context would clear the whole repo,
        // so we refuse to issue the request unless a concrete graph IRI is set.
        async function deleteAsset() {
            const ctx = (selectedGraphUri || '').trim();
            if (!ctx) {
                alert("No asset selected — refusing to delete. (An unscoped delete would clear the entire repository.)");
                return;
            }
            if (!/^https?:\/\//i.test(ctx)) {
                alert("Selected graph IRI looks invalid — refusing to delete:\n" + ctx);
                return;
            }
            if (!confirm(`Delete ONLY this graph and its statements?\n\n${ctx}\n\nNothing else in the repository will be touched.`)) return;

            // RDF4J statements endpoint: scope to a single named graph via the
            // N-Triples-encoded context (angle brackets). Without this, DELETE on
            // /statements removes ALL statements in the repository.
            const statementsUrl = `${getBaseUrl()}/statements?context=${encodeURIComponent('<' + ctx + '>')}`;

            try {
                const response = await fetch(statementsUrl, { method: 'DELETE' });
                if(response.ok) {
                    alert("Graph removed: " + ctx);
                    resetWorkspace();
                    refreshSidebar();
                } else {
                    throw new Error("Deletion request failed.");
                }
            } catch (err) {
                alert("Could not process graph deletion.");
            }
        }

        function resetWorkspace() {
            selectedGraphUri = null;
            isCreateMode = false;
            document.getElementById('currentAssetTitle').innerText = "No Asset Selected";
            document.getElementById('currentAssetUri').innerText = "";
            document.getElementById('ttlEditor').value = "";
            document.getElementById('metaPanel').classList.add('hidden');
            toggleActionButtons(false);
        }

        function toggleActionButtons(enabled) {
            const btnSave = document.getElementById('btnSave');
            const btnDelete = document.getElementById('btnDelete');
            const btnMetadata = document.getElementById('btnMetadata');
            const btnVisualize = document.getElementById('btnVisualize');
            const btnEditNodes = document.getElementById('btnEditNodes');
            const btnVocEditor = document.getElementById('btnVocEditor');
            const btnTaxEditor = document.getElementById('btnTaxEditor');

            // Decide which single editor button is relevant for this asset's kind.
            const kind = modelKindOf(selectedGraphUri);
            const editorButtons = [btnEditNodes, btnVocEditor, btnTaxEditor];
            // Hide all three first; reveal the one matching the kind (only for existing assets).
            editorButtons.forEach(b => b.classList.add('hidden'));
            const activeEditorBtn = !isCreateMode
                ? (kind === 'vocab' ? btnVocEditor : kind === 'taxo' ? btnTaxEditor : btnEditNodes)
                : null;
            if (activeEditorBtn) activeEditorBtn.classList.remove('hidden');

            if(enabled) {
                btnSave.disabled = false; btnDelete.disabled = false;
                btnSave.classList.remove('opacity-50', 'cursor-not-allowed');
                btnDelete.classList.remove('opacity-50', 'cursor-not-allowed');
                // Metadata/Visualize/editor only make sense for existing assets, not new ones
                if (!isCreateMode) {
                    btnMetadata.disabled = false;
                    btnMetadata.classList.remove('opacity-50', 'cursor-not-allowed');
                    btnVisualize.disabled = false;
                    btnVisualize.classList.remove('opacity-50', 'cursor-not-allowed');
                    if (activeEditorBtn) {
                        activeEditorBtn.disabled = false;
                        activeEditorBtn.classList.remove('opacity-50', 'cursor-not-allowed');
                    }
                }
            } else {
                btnSave.disabled = true; btnDelete.disabled = true;
                btnMetadata.disabled = true;
                btnVisualize.disabled = true;
                editorButtons.forEach(b => { b.disabled = true; b.classList.add('opacity-50', 'cursor-not-allowed'); });
                btnSave.classList.add('opacity-50', 'cursor-not-allowed');
                btnDelete.classList.add('opacity-50', 'cursor-not-allowed');
                btnMetadata.classList.add('opacity-50', 'cursor-not-allowed');
                btnVisualize.classList.add('opacity-50', 'cursor-not-allowed');
            }
        }

        // ── Sidebar resize ──
        (function() {
            const SB_KEY = 'ev_mm_sidebar_w';
            const sidebar = document.getElementById('sidebar');
            const handle  = document.getElementById('sidebar-resizer');
            const MIN = 200, MAX = 640;
            const saved = parseInt(localStorage.getItem(SB_KEY), 10);
            if (saved >= MIN && saved <= MAX) sidebar.style.width = saved + 'px';

            let dragging = false;
            handle.addEventListener('mousedown', e => {
                dragging = true;
                handle.style.background = '#6366f1';
                document.body.style.cursor = 'col-resize';
                document.body.style.userSelect = 'none';
                e.preventDefault();
            });
            window.addEventListener('mousemove', e => {
                if (!dragging) return;
                let w = e.clientX - sidebar.getBoundingClientRect().left;
                w = Math.max(MIN, Math.min(MAX, w));
                sidebar.style.width = w + 'px';
            });
            window.addEventListener('mouseup', () => {
                if (!dragging) return;
                dragging = false;
                handle.style.background = '#374151';
                document.body.style.cursor = '';
                document.body.style.userSelect = '';
                localStorage.setItem(SB_KEY, parseInt(sidebar.style.width, 10));
            });
            // double-click resets to default
            handle.addEventListener('dblclick', () => {
                sidebar.style.width = '320px';
                localStorage.removeItem(SB_KEY);
            });
            // subtle hover cue
            handle.addEventListener('mouseenter', () => { if (!dragging) handle.style.background = '#4b5563'; });
            handle.addEventListener('mouseleave', () => { if (!dragging) handle.style.background = '#374151'; });
        })();
    </script>
</body>
</html>
